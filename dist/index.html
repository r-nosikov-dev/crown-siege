<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Crown Siege</title><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"><style>html {
            width: 100%;

        body {

        .snes-button {
            --bg-color: #e6e6e6;
            --text-color: #4a4a4a;
            --shadow-color: #8c8c8c;
            --highlight-color: #ffffff;

            position: relative;
            display: inline-block;
            padding: clamp(10px, 2.5vw, 15px) clamp(16px, 5vw, 30px);
            max-width: 90vw;
            text-align: center;
            text-transform: uppercase;
            background-color: var(--bg-color);
            border: none;
            border-radius: 40px;
            box-shadow:
                inset 2px 2px 0px var(--highlight-color),
                inset -2px -2px 0px var(--shadow-color),
                2px 2px 5px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            outline: none;
            transition: transform 0.1s, box-shadow 0.1s;
            z-index: 1000;
        }

        .snes-button:active {
            transform: translateY(2px);
            box-shadow:

                inset -2px -2px 0px var(--highlight-color);

        .snes-button.has-ember-color {

        .snes-button.has-sun-color {

            --text-color: #3b2f00;
            --shadow-color: #e67700;

        .overheat-bar {

        .overheat-bar__track {

            background: rgba(20, 20, 30, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;

            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .overheat-bar__fill {
            height: 100%;

            border-radius: 3px;
            transition: width 0.05s linear;
        }

        .overheat-bar__fill--max {
            background: linear-gradient(90deg, #ff2200, #ff6600, #ffaa00);
            animation: overheat-pulse 0.35s ease-in-out infinite alternate;
        }

        @keyframes overheat-pulse {
            from { filter: brightness(1); }
