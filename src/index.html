<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixiJS Mini-Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
    }

    canvas {
        display: block;
    }

    /* SNES CSS Buttons */
    .snes-button {
        --bg-color: #e6e6e6;
        --text-color: #4a4a4a;
        --shadow-color: #8c8c8c;
        --highlight-color: #ffffff;

        position: absolute;
        display: inline-block;
        padding: 15px 30px;
        font-family: 'Press Start 2P', cursive;
        font-size: 16px;
        text-transform: uppercase;
        color: var(--text-color);
        background-color: var(--bg-color);
        border: none;
        border-radius: 40px;
        box-shadow:
            inset 2px 2px 0px var(--highlight-color),
            inset -2px -2px 0px var(--shadow-color),
            2px 2px 5px rgba(0, 0, 0, 0.3);
        cursor: pointer;
        outline: none;
        transition: transform 0.1s, box-shadow 0.1s;
        z-index: 1000;
        /* Ensure it's above canvas */
    }

    .snes-button:active {
        transform: translateY(2px);
        box-shadow:
            inset 2px 2px 0px var(--shadow-color),
            inset -2px -2px 0px var(--highlight-color);
    }

    /* Colors */
    .snes-button.has-ember-color {
        --bg-color: #ff6b6b;
        --text-color: #ffffff;
        --shadow-color: #c92a2a;
        --highlight-color: #ff8787;
    }

    .snes-button.has-ocean-color {
        --bg-color: #339af0;
        --text-color: #ffffff;
        --shadow-color: #1864ab;
        --highlight-color: #4dabf7;
    }

    #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        /* Let clicks pass through to canvas if not on button */
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    #ui-layer>* {
        pointer-events: auto;
        /* Re-enable clicks for buttons */
        margin: 10px;
    }
</style>
</head>

<body>
    <div id="ui-layer"></div>
</body>

</html>
