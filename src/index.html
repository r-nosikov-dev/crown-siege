<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crown Siege</title>
    <link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
    <link rel="apple-touch-icon" sizes="64x64" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style id="game-typography"><%= htmlWebpackPlugin.options.inlineGameStyles %></style>
</head>

<body class="game-loading">
    <div id="loading-screen" class="loading-screen" aria-live="polite" aria-busy="true">
        <div class="loading-screen__title">CROWN SIEGE</div>
        <div class="loading-screen__subtitle">DEFEND THE CASTLE</div>
        <div class="loading-screen__bar-wrap">
            <div class="loading-screen__bar-track">
                <div id="loading-bar-fill" class="loading-screen__bar-fill"></div>
            </div>
            <div class="loading-screen__meta">
                <span id="loading-status" class="loading-screen__status">Loading...</span>
                <span id="loading-percent" class="loading-screen__percent">0%</span>
            </div>
        </div>
    </div>
    <div id="ui-layer"></div>
</body>

</html>
